# Tako VM Squid Proxy Configuration
#
# IMPORTANT: This is a basic logging proxy, not a full enforcement solution.
# True allowlist enforcement requires additional infrastructure.
#
# Current behavior:
# - Logs all HTTP/HTTPS requests from containers
# - Routes traffic through proxy
# - Does NOT enforce allowed_hosts (see README.md for enforcement options)

http_port 3128
visible_hostname tako-proxy

# Minimal cache
cache deny all

# Logging - all requests are logged for audit
access_log stdio:/dev/stdout combined
cache_log stdio:/dev/stderr

# ACL definitions
acl localnet src 172.16.0.0/12
acl localnet src 10.0.0.0/8
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Security: deny non-standard ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow connections from Docker networks
http_access allow localnet

# Allow localhost
http_access allow localhost

# Deny everything else
http_access deny all

# Privacy: don't leak internal info
forwarded_for delete
via off

# Connection settings
connect_timeout 30 seconds
read_timeout 60 seconds
