# Tako VM Egress Proxy
#
# This creates a Squid proxy for logging and routing container network traffic.
# Containers with allowed_hosts connect to the 'tako-proxy' network.
#
# Usage:
#   docker-compose -f scripts/proxy/docker-compose.yaml up -d
#
# NOTE: This proxy logs requests but does not enforce allowlists.
# See README.md for enforcement options.

version: '3.8'

services:
  tako-proxy:
    image: ubuntu/squid:latest
    container_name: tako-proxy
    hostname: tako-proxy
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    networks:
      tako-proxy:
        aliases:
          - tako-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tako-proxy:
    name: tako-proxy
    driver: bridge
