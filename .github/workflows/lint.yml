name: Lint

on: [push]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Create venv and install ruff
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install ruff
    - name: Run ruff check
      run: |
        source .venv/bin/activate
        ruff check .
    - name: Run ruff format check
      run: |
        source .venv/bin/activate
        ruff format --check .
