name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
          pip install pytest-cov

      - name: Build executor image
        run: docker build -t code-executor:latest -f docker/Dockerfile.executor .

      - name: Run tests with coverage
        env:
          TAKO_VM_SECURITY_MODE: permissive
          TAKO_VM_ENABLE_CAP_RESTRICTIONS: "false"  # GitHub Actions Docker can't modify capability bounding sets
          # Seccomp is enabled (default) - works on native Linux
        run: |
          pytest tests/ -v --timeout=120 \
            --cov=tako_vm \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            coverage.xml
          retention-days: 7
