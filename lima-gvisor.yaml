# Lima VM with gVisor for Tako VM development
# Usage: limactl start lima-gvisor.yaml

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "50GiB"

# Mount home directory for code access
mounts:
  - location: "~"
    writable: true

# Enable containerd (for Docker)
containerd:
  system: false
  user: false

# Provision script to install Docker and gVisor
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Install Docker
      if ! command -v docker &> /dev/null; then
        curl -fsSL https://get.docker.com | sh
        usermod -aG docker "${LIMA_CIDATA_USER}"
      fi

      # Install gVisor
      if ! command -v runsc &> /dev/null; then
        ARCH=$(uname -m)
        if [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        elif [ "$ARCH" = "x86_64" ]; then
          ARCH="amd64"
        fi

        # Add gVisor repo
        curl -fsSL https://gvisor.dev/archive.key | gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
        echo "deb [arch=${ARCH} signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" > /etc/apt/sources.list.d/gvisor.list

        apt-get update
        apt-get install -y runsc

        # Configure Docker to use runsc
        runsc install
        systemctl restart docker
      fi

      # Verify gVisor works
      docker run --runtime=runsc --rm hello-world || true

probes:
  - script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until command -v docker &> /dev/null; do sleep 3; done"; then
        echo >&2 "docker is not installed yet"
        exit 1
      fi
      if ! timeout 30s bash -c "until docker info &> /dev/null; do sleep 3; done"; then
        echo >&2 "docker is not running yet"
        exit 1
      fi
    hint: See "/var/log/cloud-init-output.log" in the guest

message: |
  Tako VM development environment with gVisor is ready!

  To use:
    limactl shell tako-gvisor
    cd ~/tako-vm
    pytest tests/ -v

  gVisor (runsc) is installed and configured as the Docker runtime.
