site_name: Tako VM
site_description: Secure Python Code Execution System
site_url: https://tako-vm.dev

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Guide:
    - Basic Execution: guide/basic-execution.md
    - Async Jobs: guide/async-jobs.md
    - Environments: guide/environments.md
    - Authentication: guide/authentication.md
    - Error Handling: guide/error-handling.md
  - API Reference:
    - REST API: api/rest.md
    - Python SDK: api/sdk.md
  - Deployment:
    - How to Deploy: deployment/how-to-deploy.md
    - Production Setup: deployment/production.md
    - Security: deployment/security.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/example/tako-vm
